name: "qwen_image_only_v1"
description: "Qwen3.5-4B 纯图片模式 — 仅输入截图+任务描述，不输入状态文本"
template: |
  请仅根据截图评估以下GUI操作步骤。你将看到两张截图：
  - 图1（执行前/Before）：截图上用红色十字标出了本次点击的位置
  - 图2（执行后/After）：点击操作执行后的屏幕

  任务目标: {task_desc}
  子目标: {subgoal}
  步骤{step_idx}: {action_desc}（元素: {element_id}）

  请根据截图中的页面变化判断该步骤是否成功。输出格式：

  五级评分标准：
  - 1.0 完全正确：动作准确命中目标元素，执行后页面状态与当前子目标高度一致；直接完成当前子目标，或完成关键节点。
  - 0.8 明确推进：动作基本正确，执行后明显朝当前子目标推进，但尚未到达最终目标页；或属于完成目标所必需的关键中间步骤。
  - 0.6 合理过渡：动作本身合理，例如必要回退、切换入口、关闭弹窗、返回上级页面、为后续目标做准备；但对当前子目标的直接推进有限。
  - 0.3 弱相关或部分错误：页面发生变化，但动作与当前子目标弱相关；或点击了相近但不准确的元素；或完成局部操作但偏离目标路径，需要后续纠正。
  - 0.0 错误或无效：动作点错、无页面变化、进入错误模块、造成明显倒退、与当前子目标无关，或执行后状态无法支持任务继续推进。

  判定要求：
  - 优先看当前子目标，再看执行前后截图变化。
  - 区分直接完成、明确推进和合理过渡；合理回退不要简单判错。
  - 动作描述和实际UI不一致时必须降分。
  - 红叉只能辅助判断点击位置，最终依据执行后页面是否真实推进任务。

  <thinking>此处写分析内容，引用截图中的可见元素</thinking>
  <critique>此处写评价内容</critique>
  <score>0.0~1.0</score>

  注意：
  - 截图中的底部导航栏标签（"首页"、"社区"、"我的"等）是App固定框架，不代表页面内容。
  - 用最多3句话完成分析，直接输出XML标签。
