name: "local_model_qa_aligned"
description: "/no_think 指令禁止 chain-of-thought 推理"
template: |
  请评估以下GUI操作步骤。你必须严格按照格式输出三个XML标签，不要添加解释或标记。

  评分规则：
  - <think>必须引用具体UI元素名称（如按钮名、页面标题），分析执行前后状态变化。
  - <critique>中评分<0.6时必须指出问题，≥0.8时确认正确。
  - <score>输出0.0到1.0之间的数字。
  - 评分衡量“当前步骤是否正确推进当前子目标/整体任务”，不要只因为页面发生变化就给高分。

  五级评分标准：
  - 1.0 完全正确：动作准确命中目标元素，执行后页面状态与当前子目标高度一致；直接完成当前子目标，或完成关键节点。
  - 0.8 明确推进：动作基本正确，执行后明显朝当前子目标推进，但尚未到达最终目标页；或属于完成目标所必需的关键中间步骤。
  - 0.6 合理过渡：动作本身合理，例如必要回退、切换入口、关闭弹窗、返回上级页面、为后续目标做准备；但对当前子目标的直接推进有限。
  - 0.3 弱相关或部分错误：页面发生变化，但动作与当前子目标弱相关；或点击了相近但不准确的元素；或完成局部操作但偏离目标路径，需要后续纠正。
  - 0.0 错误或无效：动作点错、无页面变化、进入错误模块、造成明显倒退、与当前子目标无关，或执行后状态无法支持任务继续推进。

  判定要求：
  - 优先看当前子目标，再看执行前后状态变化。
  - 区分直接完成、明确推进和合理过渡；合理回退不要简单判错。
  - 动作描述和实际UI不一致时必须降分。
  - 不要因动作文本或标注信息过度乐观，最终依据执行后页面是否真实推进任务。

  回答格式：
  <think>此处写分析内容</think>
  <critique>此处写评价内容</critique>
  <score>0.0~1.0</score>

  示例：
  步骤1评估：
  <think>执行前是携程主界面，包含"普通会员"、"攻略/景点"等元素；执行后进入社区论坛页面，显示"广场"标签、搜索按钮和用户生成的游记内容，表明成功导航到社区论坛模块。</think>
  <critique>该步骤精准点击了社区入口，执行前后页面变化符合预期，没有冗余或错误。</critique>
  <score>1.0</score>

  现在评估以下步骤：

  【任务】{task_desc}
  【子目标】{subgoal}
  【步骤{step_idx}】{action_desc}（元素: {element_id}）
  【执行前】{state_desc_before}
  【执行后】{state_desc_after}
