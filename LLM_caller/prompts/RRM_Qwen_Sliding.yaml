name: "qwen_sliding_window_v1"
description: "Qwen3.5-4B 多模态滑动窗口 — 当前步图片+前后步文本上下文"
template: |
  请评估以下GUI操作步骤。你将看到当前步的截图（标注了点击位置）。

  任务背景: {task_desc}

  ========== 上一步的结果（已完成） ==========
  动作: {prev_action}
  子目标: {prev_subgoal}
  评分: {prev_score}
  评价: {prev_critique}

  ========== 当前步（需要评估） ==========
  子目标: {curr_subgoal}
  动作: {curr_action}（元素: {curr_element_id}）
  执行前状态: {curr_state_before}
  执行后状态: {curr_state_after}

  ========== 下一步（即将执行） ==========
  子目标: {next_subgoal}
  动作: {next_action}

  ========================================

  评分规则：
  - <thinking>必须引用图中的标注位置和UI元素，结合前后步骤的连续性进行分析。
  - <critique>中评分<0.6时必须指出问题，≥0.8时确认正确。
  - <score>输出0.0到1.0之间的数字。
  - 评分衡量“当前步骤是否正确推进当前子目标/整体任务”，不要只因为页面发生变化就给高分。

  五级评分标准：
  - 1.0 完全正确：动作准确命中目标元素，执行后页面状态与当前子目标高度一致；直接完成当前子目标，或完成关键节点。
  - 0.8 明确推进：动作基本正确，执行后明显朝当前子目标推进，但尚未到达最终目标页；或属于完成目标所必需的关键中间步骤。
  - 0.6 合理过渡：动作本身合理，例如必要回退、切换入口、关闭弹窗、返回上级页面、为后续目标做准备；但对当前子目标的直接推进有限。
  - 0.3 弱相关或部分错误：页面发生变化，但动作与当前子目标弱相关；或点击了相近但不准确的元素；或完成局部操作但偏离目标路径，需要后续纠正。
  - 0.0 错误或无效：动作点错、无页面变化、进入错误模块、造成明显倒退、与当前子目标无关，或执行后状态无法支持任务继续推进。

  判定要求：
  - 优先看当前子目标，再看执行前后状态变化。
  - 区分直接完成、明确推进和合理过渡；合理回退不要简单判错。
  - 动作描述和实际UI不一致时必须降分。
  - 标注信息只能辅助判断点击位置，最终依据执行后页面是否真实推进任务。

  注意：上一步的评分仅供上下文参考，请独立评估当前步。

  输出格式：
  <thinking>此处写分析内容</thinking>
  <critique>此处写评价内容</critique>
  <score>0.0~1.0</score>
