name: "qwen_gs_step2_text"
description: "GS Step 2 仅文本 — 视觉匹配不一致时，仅根据状态文本评分"
template: |
  根据状态变化判断该步操作是否正确。

  任务目标: {task_desc}
  子目标: {subgoal}
  动作: {action_desc}
  执行前状态: {state_desc_before}
  执行后状态: {state_desc_after}

  注意：视觉扫描未能确认操作与截图一致，请仅根据状态文本描述判断。
  判断标准：状态变化是否推进了任务目标。

  五级评分标准（用于内部判断，最终仍按0/1输出）：
  - 1.0 完全正确：动作准确命中目标元素，执行后页面状态与当前子目标高度一致；直接完成当前子目标，或完成关键节点。
  - 0.8 明确推进：动作基本正确，执行后明显朝当前子目标推进，但尚未到达最终目标页；或属于完成目标所必需的关键中间步骤。
  - 0.6 合理过渡：动作本身合理，例如必要回退、切换入口、关闭弹窗、返回上级页面、为后续目标做准备；但对当前子目标的直接推进有限。
  - 0.3 弱相关或部分错误：页面发生变化，但动作与当前子目标弱相关；或点击了相近但不准确的元素；或完成局部操作但偏离目标路径，需要后续纠正。
  - 0.0 错误或无效：动作点错、无页面变化、进入错误模块、造成明显倒退、与当前子目标无关，或执行后状态无法支持任务继续推进。
  若内部判断分数 >=0.8，输出【最终得分: 1】；否则输出【最终得分: 0】。

  只输出一行：【最终得分: 0】或【最终得分: 1】
