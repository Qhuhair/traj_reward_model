name: "hierarchical_memory_multimodal_v1"
description: "分层记忆多模态评分 — 历史摘要 + 最近窗口文本 + 当前步图片"
template: |
  请评估以下 GUI 操作步骤。你将看到当前步骤的执行前/执行后截图，同时获得历史摘要和最近窗口文本。

  重要输出约束：
  - 必须只输出三段 XML，不要输出 Markdown、列表、编号、评分标准复述或额外说明。
  - <thinking>最多 2 句，只写关键依据，不要反复推理，不要展开长篇分析。
  - <critique>最多 2 句，直接说明正确性或主要问题。
  - <score>只能是 0.0、0.3、0.6、0.8、1.0 之一。
  - 输出必须以 <thinking> 开始，并以 </score> 结束；三个标签都必须闭合。

  【任务】{task_desc}

  【当前子目标】{curr_subgoal}

  【历史步骤摘要】
  {history_summary}

  【最近步骤信息】
  {recent_steps_detail}

  【当前步骤】
  步骤 {step_idx}
  动作：{curr_action}
  元素：{curr_element_id}
  执行前状态：{curr_state_before}
  执行后状态：{curr_state_after}

  评分规则：
  - <thinking>必须结合历史摘要、最近步骤连续性、当前截图和状态描述进行分析。
  - <critique>中评分<0.6时必须指出问题，≥0.8时确认正确。
  - <score>输出0.0到1.0之间的数字。
  - 评分衡量“当前步骤是否正确推进当前子目标/整体任务”，不要只因为页面发生变化就给高分。

  五级评分标准：
  - 1.0 完全正确：动作准确命中目标元素，执行后页面状态与当前子目标高度一致；直接完成当前子目标，或完成关键节点。
  - 0.8 明确推进：动作基本正确，执行后明显朝当前子目标推进，但尚未到达最终目标页；或属于完成目标所必需的关键中间步骤。
  - 0.6 合理过渡：动作本身合理，例如必要回退、切换入口、关闭弹窗、返回上级页面、为后续目标做准备；但对当前子目标的直接推进有限。
  - 0.3 弱相关或部分错误：页面发生变化，但动作与当前子目标弱相关；或点击了相近但不准确的元素；或完成局部操作但偏离目标路径，需要后续纠正。
  - 0.0 错误或无效：动作点错、无页面变化、进入错误模块、造成明显倒退、与当前子目标无关，或执行后状态无法支持任务继续推进。

  判定要求：
  - 优先看当前子目标，再看执行前后状态变化。
  - 最近窗口只代表当前及之前步骤，不得推测未来步骤。
  - 区分直接完成、明确推进和合理过渡；合理回退不要简单判错。
  - 动作描述和实际 UI 不一致时必须降分。
  - 当前截图中的标注只能辅助判断点击位置，最终依据执行后页面是否真实推进任务。
  - 如果已经得到判断，立即输出 XML，不要继续自我反驳或重复确认。

  严格按以下格式输出：
  <thinking>一句到两句关键分析</thinking>
  <critique>一句到两句评价</critique>
  <score>0.0</score>
