name: "qwen_traj_summary_v1"
description: "Qwen3.5-4B 轨迹级总结 — 评估整条轨迹是否达成总目标"
template: |
  请评估以下GUI操作轨迹是否成功完成了总目标。

  【总目标】{task_desc}

  【子目标列表】
  {subgoals_text}

  【各步骤评分】
  {steps_summary}

  请综合所有步骤的评分和动作，判断整条轨迹是否完成了总目标。

  评分规则：
  - <think>分析轨迹的整体逻辑连贯性、关键步骤是否到位、有无冗余或偏离
  - <critique>指出轨迹的优点和不足
  - <score>输出0.0到1.0之间的数字（1.0=完全达成目标，0.0=完全偏离目标）

  五级评分标准：
  - 1.0 完全完成：所有关键子目标完成，路径逻辑连贯，最终状态与总目标高度一致。
  - 0.8 基本完成：主要子目标完成，存在少量冗余、弱推进或非关键偏差，但不影响总目标达成。
  - 0.6 部分完成：完成了部分关键目标或形成合理路径，但缺少重要子目标，最终状态只能部分支持总目标。
  - 0.3 低质量完成或明显偏离：只完成少量相关步骤，存在明显绕路、误点或目标偏移，需要大量后续纠正。
  - 0.0 未完成：轨迹整体进入错误模块、关键目标缺失、最终状态与总目标无关，或多数步骤无效。

  判定要求：
  - 优先看总目标和关键子目标是否完成。
  - 不要只因平均步骤分高就给满分；必须检查最终状态和关键路径。
  - 合理回退和必要过渡不应视为错误，但冗余过多要降分。

  输出格式：
  <thinking>分析内容</thinking>
  <critique>评价内容</critique>
  <score>0.0~1.0</score>
