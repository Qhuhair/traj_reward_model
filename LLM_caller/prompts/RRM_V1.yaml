name: "agent_rrm_template"
description: "基于执行前后状态变化评估每一步的模板"
template: |
  【任务信息】
  任务目标: {task_desc}
  子目标: {subgoal}

  【当前步骤】
  步骤编号: 第{step_idx}步
  执行动作: {action_desc}
  点击元素: {element_id}

  【执行前 UI 状态】
  {state_desc_before}

  【执行后 UI 状态】
  {state_desc_after}

  请评估该步骤。你必须严格按照以下格式回答：

  五级评分标准：
  - 1.0 完全正确：动作准确命中目标元素，执行后页面状态与当前子目标高度一致；直接完成当前子目标，或完成关键节点。
  - 0.8 明确推进：动作基本正确，执行后明显朝当前子目标推进，但尚未到达最终目标页；或属于完成目标所必需的关键中间步骤。
  - 0.6 合理过渡：动作本身合理，例如必要回退、切换入口、关闭弹窗、返回上级页面、为后续目标做准备；但对当前子目标的直接推进有限。
  - 0.3 弱相关或部分错误：页面发生变化，但动作与当前子目标弱相关；或点击了相近但不准确的元素；或完成局部操作但偏离目标路径，需要后续纠正。
  - 0.0 错误或无效：动作点错、无页面变化、进入错误模块、造成明显倒退、与当前子目标无关，或执行后状态无法支持任务继续推进。

  判定要求：优先看当前子目标，再看执行前后状态变化；合理回退不要简单判错；动作描述和实际 UI 不一致时必须降分。

  <think>基于执行前后状态变化的逻辑推理</think>
  <critique>关于该动作是否冗余或错误的批判性反馈</critique>
  <score>一个 0.0 到 1.0 之间的概率值，代表该动作达成目标的潜力</score>
