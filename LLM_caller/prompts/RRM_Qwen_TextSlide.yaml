name: "qwen_text_slide_v1"
description: "Qwen3.5-4B 纯文本滑动窗口 — 3步上下文，评估中间步"
template: |
  请评估以下GUI操作步骤。你将看到连续三步的描述，请重点评估【当前步】。

  任务背景: {task_desc}

  上一步：{prev_action}
  上一步子目标：{prev_subgoal}

  当前步：{curr_action}（元素: {curr_element_id}）
  当前步子目标：{curr_subgoal}
  执行前：{curr_state_before}
  执行后：{curr_state_after}

  下一步：{next_action}
  下一步子目标：{next_subgoal}

  你必须严格按照格式输出三个XML标签，不要添加解释或标记。

  评分规则：
  - <think>分析执行前后状态变化，引用具体UI元素
  - <critique>评分<0.6时必须指出问题，≥0.8时确认正确
  - <score>输出0.0到1.0之间的数字
  - 评分衡量“当前步骤是否正确推进当前子目标/整体任务”，不要只因为页面发生变化就给高分。

  五级评分标准：
  - 1.0 完全正确：动作准确命中目标元素，执行后页面状态与当前子目标高度一致；直接完成当前子目标，或完成关键节点。
  - 0.8 明确推进：动作基本正确，执行后明显朝当前子目标推进，但尚未到达最终目标页；或属于完成目标所必需的关键中间步骤。
  - 0.6 合理过渡：动作本身合理，例如必要回退、切换入口、关闭弹窗、返回上级页面、为后续目标做准备；但对当前子目标的直接推进有限。
  - 0.3 弱相关或部分错误：页面发生变化，但动作与当前子目标弱相关；或点击了相近但不准确的元素；或完成局部操作但偏离目标路径，需要后续纠正。
  - 0.0 错误或无效：动作点错、无页面变化、进入错误模块、造成明显倒退、与当前子目标无关，或执行后状态无法支持任务继续推进。

  判定要求：
  - 优先看当前子目标，再看执行前后状态变化。
  - 区分直接完成、明确推进和合理过渡；合理回退不要简单判错。
  - 动作描述和实际UI不一致时必须降分。
  - 不要因上下文中下一步存在补救而过度提高当前步分数。

  回答格式：
  <think>此处写分析内容</think>
  <critique>此处写评价内容</critique>
  <score>0.0~1.0</score>

  示例：
  步骤2评估（上一步是进入社区论坛）：
  <think>上一步进入了社区论坛页面，当前步从社区论坛页面点击携程旅行主入口回到首页。首页顶部显示"普通会员"和"96"积分，表明已返回主页。该步骤完成了从社区回到主入口的导航，为下一步进入会员中心做准备。</think>
  <critique>该步骤准确从社区页面导航回主界面，页面变化符合预期，没有冗余或错误。虽然未直接打开会员中心，但返回主页是进入会员中心的必要前置步骤。</critique>
  <score>0.85</score>
