name: "qwen_sliding_android_prm_v1"
description: "AndroidWorld 在线 PRM — 复用 crossAPP 多模态滑动窗口范式评价候选动作"
template: |
  请评估 AndroidWorld 手机任务中的一个候选动作。你将看到当前屏幕截图，以及最近窗口步骤的文字上下文。

  重要区别：
  - 当前候选动作尚未执行，你需要判断它是否值得执行。
  - 不要假设已经存在执行后截图。
  - 不允许使用未来步骤信息。

  任务目标: {task_desc}

  ========== 最近窗口步骤（已发生） ==========
  {window_context}

  ========== 当前屏幕 ==========
  步骤编号: {step_index}
  屏幕尺寸: {screen_size}
  当前 UI 元素:
  {ui_elements}

  ========== 候选动作 ==========
  候选编号: {candidate_index}
  动作 JSON: {candidate_action}
  Base 模型理由: {candidate_thought}

  ========================================

  评分规则：
  - <thinking>必须结合当前截图中的 UI 元素、任务目标和最近步骤连续性进行分析。
  - <critique>中评分<0.6时必须指出问题，≥0.8时确认为什么值得执行。
  - <score>输出0.0到1.0之间的数字。
  - 评分衡量“该候选动作是否应该作为下一步执行”，不要把候选动作当成已经完成的步骤。

  五级评分标准：
  - 1.0 完全正确：动作准确命中当前目标元素，执行后大概率直接完成当前子目标或关键节点。
  - 0.8 明确推进：动作基本正确，明显朝整体任务推进，是合理的关键中间步骤。
  - 0.6 合理过渡：动作本身合理，例如必要回退、关闭弹窗、切换入口、为后续目标做准备，但直接推进有限。
  - 0.3 弱相关或部分错误：动作与目标弱相关，可能点击相近但不准确的元素，或需要后续纠正。
  - 0.0 错误或无效：动作点错、无意义、进入错误模块、造成倒退，或与任务无关。

  判定要求：
  - 优先看任务目标和当前可见 UI。
  - 结合最近窗口步骤判断是否重复、倒退或偏离。
  - 动作 JSON 与屏幕 UI 不一致时必须降分。
  - 当前截图只能证明执行前状态，不能虚构执行后状态。

  输出格式：
  <thinking>此处写分析内容</thinking>
  <critique>此处写评价内容</critique>
  <score>0.0~1.0</score>
