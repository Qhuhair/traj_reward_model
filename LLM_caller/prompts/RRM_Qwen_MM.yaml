name: "qwen_multimodal_v1"
description: "Qwen3.5-4B 多模态 — 同时接收标注截图和文本状态描述"
template: |
  请评估以下GUI操作步骤。你将看到两张标注过的手机截图：
  - 图1（执行前/Before）：当前屏幕，**红色十字标出了本次点击的位置**，绿色矩形框标出了目标UI元素
  - 图2（执行后/After）：点击操作执行后的屏幕

  你必须严格按照格式输出三个XML标签，不要添加解释或标记。

  评分规则：
  - <think>（或<thinking>）必须结合截图中的标注位置和UI元素，分析执行前后页面变化。
  - <critique>中评分<0.6时必须指出问题，≥0.8时确认正确。
  - <score>输出0.0到1.0之间的数字。

  重要提示：
  1. 请使用不多于3句话完成分析，直接输出XML标签。
  2. 步骤描述中提到的点击元素名称可能不会以完全相同的文字出现在截图中。
     请根据执行前后页面的整体变化来判断步骤是否成功（如页面标题、功能模块、
     内容类型是否发生了预期变化），而不是寻找精确匹配的按钮文本。
  3. 截图中的底部导航栏标签（如"首页"、"社区"、"我的"等）是App的固定框架UI，
     不代表当前页面内容。

  回答格式：
  <thinking>此处写分析内容</thinking>
  <critique>此处写评价内容</critique>
  <score>0.0~1.0</score>

  示例：
  步骤1评估：
  <thinking>执行前截图中红叉标记在"社区论坛"入口位置，绿框标出了该可点击元素；执行后截图进入了社区/广场页面，顶部有"广场"标签和搜索按钮，中部显示用户提问和旅行日记，表明导航成功。</thinking>
  <critique>该步骤精准点击了社区入口，执行前后页面变化符合预期，没有冗余或错误。</critique>
  <score>1.0</score>

  现在评估以下步骤：

  【任务】{task_desc}
  【子目标】{subgoal}
  【步骤{step_idx}】{action_desc}（元素: {element_id}）
  【执行前状态描述】{state_desc_before}
  【执行后状态描述】{state_desc_after}
